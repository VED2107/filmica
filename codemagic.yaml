workflows:
  ios-debug:
    name: iOS Debug Test
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get packages
        script: flutter packages pub get
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Analyze
        script: flutter analyze --no-fatal-infos
      - name: Build iOS debug (no codesign)
        script: flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
    publishing:
      email:
        recipients:
          - vedchauhan2107@gmail.com
        notify:
          success: true
          failure: true

  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.filmica.app
    scripts:
      - name: Get packages
        script: flutter packages pub get
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Analyze
        script: flutter analyze --no-fatal-infos
      - name: Build iOS release
        script: flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - vedchauhan2107@gmail.com
        notify:
          success: true
          failure: true

  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Get packages
        script: flutter packages pub get
      - name: Analyze
        script: flutter analyze --no-fatal-infos
      - name: Build Android
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab
    publishing:
      google_play:
        track: internal
