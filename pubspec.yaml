name: filmica
description: "Premium analog camera app with beautiful film-like photo effects."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State & Routing
  flutter_riverpod: ^2.5.0
  flutter_hooks: ^0.20.0
  hooks_riverpod: ^2.5.0
  go_router: ^14.0.0

  # Backend
  supabase_flutter: ^2.5.0

  # Payments
  purchases_flutter: ^8.0.0

  # Camera & Media
  camera: ^0.11.0
  image_picker: ^1.1.0
  gal: ^2.3.0
  share_plus: ^9.0.0

  # Firebase
  firebase_core: ^3.0.0
  firebase_analytics: ^11.0.0
  firebase_crashlytics: ^4.0.0

  # Local Storage
  shared_preferences: ^2.2.0

  # Auth
  sign_in_with_apple: ^6.0.0
  google_sign_in: ^6.2.0

  # UI
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.0

  # Utils
  url_launcher: ^6.2.0
  path_provider: ^2.1.0
  permission_handler: ^11.3.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/overlays/
    - assets/thumbnails/
    - assets/onboarding/
    - assets/watermark/
    - assets/samples/
    - assets/luts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
